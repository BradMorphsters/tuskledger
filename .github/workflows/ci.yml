name: CI

# Triggers on every push to any branch and on every PR. Cheap to run, catches
# the obvious breakage (syntax errors, missing imports, broken Vite builds)
# before a reviewer has to.
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  backend:
    name: Backend (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11 is the project's documented runtime; 3.12 forward-checks for
        # upcoming Python versions so we hear about deprecations early.
        python: ['3.11', '3.12']
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Compile every Python source
        # py_compile catches SyntaxError + obvious import-time issues across
        # the whole tree without needing a real DB or Plaid credentials.
        run: |
          python -m compileall -q app
          python -m compileall -q alembic/versions
          python -m compileall -q tests

      - name: Run pytest
        # Unit tests for analytics logic: recurring detection, forecasting,
        # amortization, transfer detection. Each test is self-contained with
        # its own in-memory SQLite database fixture.
        run: python -m pytest tests/ -q

      - name: Boot smoke test
        # Import app.main with dummy env vars and shut down. Confirms all
        # routers register cleanly and SQLAlchemy mappings resolve.
        env:
          PLAID_CLIENT_ID: ci
          PLAID_SECRET: ci
          PLAID_ENV: sandbox
          DEMO_ENABLED: 'false'
        run: python -c "from app.main import app; print(f'routes:', len(app.routes))"

  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Production build
        # vite build typechecks JSX imports + bundles. If anything is
        # broken in production output, this catches it.
        run: npm run build
