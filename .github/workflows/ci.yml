name: CI

# Triggers on every push to any branch and on every PR. Cheap to run, catches
# the obvious breakage (syntax errors, missing imports, broken Vite builds)
# before a reviewer has to.
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  backend:
    name: Backend (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.12 is the project's pinned runtime (see .python-version); 3.13
        # forward-checks for upcoming Python versions so we hear about
        # deprecations early. Drop 3.13 from the matrix if it starts
        # producing wheel-compatibility noise on infrequently-updated deps.
        python: ['3.12', '3.13']
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Compile every Python source
        # py_compile catches SyntaxError + obvious import-time issues across
        # the whole tree without needing a real DB or Plaid credentials.
        run: |
          python -m compileall -q app
          python -m compileall -q alembic/versions
          python -m compileall -q tests

      - name: Run pytest
        # Unit tests for analytics logic, auth flow, crypto round-trip,
        # alembic migrations, sync service, spending-summary HTTP routes.
        # Each test is self-contained with its own in-memory SQLite fixture.
        run: python -m pytest tests/ -q

      - name: pip-audit (security scan)
        # Surfaces known CVEs in pinned dependencies. Soft-fails on the
        # report so a transitive vuln doesn't block development, but the
        # output gets attached to every CI run for visibility.
        run: |
          pip install --quiet pip-audit
          pip-audit --strict || echo "::warning::pip-audit found advisories — review the report above"
        continue-on-error: true

      - name: Boot smoke test
        # Import app.main with dummy env vars and shut down. Confirms all
        # routers register cleanly and SQLAlchemy mappings resolve.
        env:
          PLAID_CLIENT_ID: ci
          PLAID_SECRET: ci
          PLAID_ENV: sandbox
          DEMO_ENABLED: 'false'
        run: python -c "from app.main import app; print(f'routes:', len(app.routes))"

  frontend:
    name: Frontend (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 22 is the project's pinned LTS (see .nvmrc); 20 stays in the
        # matrix until April 2026 when its LTS ends.
        node: ['20', '22']
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run vitest
        # Unit tests for storage helpers, format helpers, TradingTax,
        # PreflightSellModal, TradingDataFreshness, Toast, Budgets,
        # CashFlowCalendar, Loans, App auth gate.
        run: npm test

      - name: Production build
        # vite build typechecks JSX imports + bundles. If anything is
        # broken in production output, this catches it.
        run: npm run build

      - name: npm audit (security scan)
        # Surface high+ severity advisories in the dep tree. Soft-fails
        # so a transitive issue doesn't block development.
        run: npm audit --audit-level=high
        continue-on-error: true
