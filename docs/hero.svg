<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Tusk Ledger Dashboard preview — net worth, monthly spending, top categories, and AI Insights tile rendered on a dark theme.">
  <!--
    Stylized Dashboard mockup. Self-contained SVG, brand-consistent
    with the actual app theme (bg #0f1117, accent purple #a78bfa,
    accent green #34d399). Intentionally a stylized preview rather
    than a screenshot, so it does not go stale on UI changes.
    Swap for a real Dashboard screenshot whenever convenient; same
    aspect ratio (2:1) so the README layout is preserved.
  -->

  <!-- Background -->
  <rect width="1200" height="600" rx="14" fill="#0f1117"/>

  <!-- Top app bar -->
  <rect x="0" y="0" width="1200" height="48" fill="#1a1d27"/>
  <text x="32" y="30" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#e8eaed">Tusk Ledger</text>
  <circle cx="60" cy="24" r="4" fill="#a78bfa" opacity="0.9"/>
  <!-- Nav placeholders -->
  <rect x="380" y="20" width="56" height="8" rx="2" fill="#9aa0a6" opacity="0.4"/>
  <rect x="448" y="20" width="48" height="8" rx="2" fill="#9aa0a6" opacity="0.4"/>
  <rect x="508" y="20" width="64" height="8" rx="2" fill="#9aa0a6" opacity="0.4"/>
  <rect x="584" y="20" width="56" height="8" rx="2" fill="#9aa0a6" opacity="0.4"/>
  <rect x="652" y="20" width="40" height="8" rx="2" fill="#9aa0a6" opacity="0.4"/>
  <rect x="704" y="20" width="80" height="8" rx="2" fill="#9aa0a6" opacity="0.4"/>
  <!-- Sync button -->
  <rect x="1100" y="14" width="76" height="20" rx="4" fill="#a78bfa" opacity="0.85"/>
  <text x="1138" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#0f1117" text-anchor="middle">Sync</text>

  <!-- Page title -->
  <text x="32" y="92" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#e8eaed">Dashboard</text>
  <text x="32" y="112" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#9aa0a6">Friday · May 1, 2026</text>

  <!-- Row 1: Three stat tiles -->
  <!-- Net Worth -->
  <g>
    <rect x="32" y="132" width="368" height="116" rx="10" fill="#1e2130" stroke="#2a2e3f" stroke-width="1"/>
    <text x="56" y="158" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#9aa0a6" letter-spacing="0.5">NET WORTH</text>
    <text x="56" y="194" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#e8eaed">$487,213</text>
    <g>
      <text x="56" y="224" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#34d399">↑ $4,182</text>
      <text x="125" y="224" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6b7280">vs 30d ago</text>
    </g>
    <!-- Mini trend -->
    <polyline points="240,228 260,222 280,224 300,214 320,210 340,196 360,200 376,184" fill="none" stroke="#34d399" stroke-width="2"/>
  </g>

  <!-- Monthly spending -->
  <g>
    <rect x="416" y="132" width="368" height="116" rx="10" fill="#1e2130" stroke="#2a2e3f" stroke-width="1"/>
    <text x="440" y="158" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#9aa0a6" letter-spacing="0.5">MAY SPENDING</text>
    <text x="440" y="194" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#e8eaed">$3,847</text>
    <g>
      <text x="440" y="224" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fbbf24">↑ 8%</text>
      <text x="475" y="224" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6b7280">vs Apr</text>
    </g>
    <!-- Bar trend -->
    <rect x="624" y="218" width="14" height="14" rx="2" fill="#a78bfa" opacity="0.7"/>
    <rect x="644" y="208" width="14" height="24" rx="2" fill="#a78bfa" opacity="0.7"/>
    <rect x="664" y="200" width="14" height="32" rx="2" fill="#a78bfa" opacity="0.7"/>
    <rect x="684" y="212" width="14" height="20" rx="2" fill="#a78bfa" opacity="0.7"/>
    <rect x="704" y="206" width="14" height="26" rx="2" fill="#a78bfa" opacity="0.7"/>
    <rect x="724" y="196" width="14" height="36" rx="2" fill="#a78bfa" opacity="0.7"/>
    <rect x="744" y="188" width="14" height="44" rx="2" fill="#a78bfa"/>
  </g>

  <!-- Cash runway -->
  <g>
    <rect x="800" y="132" width="368" height="116" rx="10" fill="#1e2130" stroke="#2a2e3f" stroke-width="1"/>
    <text x="824" y="158" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#9aa0a6" letter-spacing="0.5">CASH RUNWAY</text>
    <text x="824" y="194" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#e8eaed">9.4 mo</text>
    <text x="824" y="224" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6b7280">at 90-day burn rate</text>
    <!-- Progress dot ring -->
    <circle cx="1100" cy="190" r="34" fill="none" stroke="#2a2e3f" stroke-width="6"/>
    <circle cx="1100" cy="190" r="34" fill="none" stroke="#34d399" stroke-width="6"
            stroke-dasharray="170 213" stroke-dashoffset="-53"
            transform="rotate(-90 1100 190)" stroke-linecap="round"/>
    <text x="1100" y="195" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#e8eaed" text-anchor="middle">79%</text>
  </g>

  <!-- Row 2 left: Top categories table -->
  <g>
    <rect x="32" y="264" width="568" height="280" rx="10" fill="#1e2130" stroke="#2a2e3f" stroke-width="1"/>
    <text x="56" y="294" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#e8eaed">Top categories — May</text>

    <!-- Row template -->
    <g font-family="Inter, system-ui, sans-serif" font-size="13" fill="#e8eaed">
      <!-- Groceries -->
      <text x="56" y="326">Groceries</text>
      <text x="540" y="326" text-anchor="end" font-weight="600">$687</text>
      <rect x="56" y="334" width="484" height="6" rx="3" fill="#2a2e3f"/>
      <rect x="56" y="334" width="320" height="6" rx="3" fill="#34d399"/>

      <!-- Dining -->
      <text x="56" y="370">Dining</text>
      <text x="540" y="370" text-anchor="end" font-weight="600">$542</text>
      <rect x="56" y="378" width="484" height="6" rx="3" fill="#2a2e3f"/>
      <rect x="56" y="378" width="252" height="6" rx="3" fill="#a78bfa"/>

      <!-- Transportation -->
      <text x="56" y="414">Transportation</text>
      <text x="540" y="414" text-anchor="end" font-weight="600">$418</text>
      <rect x="56" y="422" width="484" height="6" rx="3" fill="#2a2e3f"/>
      <rect x="56" y="422" width="195" height="6" rx="3" fill="#60a5fa"/>

      <!-- Subscriptions -->
      <text x="56" y="458">Subscriptions</text>
      <text x="540" y="458" text-anchor="end" font-weight="600">$312</text>
      <rect x="56" y="466" width="484" height="6" rx="3" fill="#2a2e3f"/>
      <rect x="56" y="466" width="146" height="6" rx="3" fill="#fbbf24"/>

      <!-- Travel -->
      <text x="56" y="502">Travel</text>
      <text x="540" y="502" text-anchor="end" font-weight="600">$245</text>
      <rect x="56" y="510" width="484" height="6" rx="3" fill="#2a2e3f"/>
      <rect x="56" y="510" width="115" height="6" rx="3" fill="#fb923c"/>
    </g>
  </g>

  <!-- Row 2 right: AI Insights tile -->
  <g>
    <rect x="616" y="264" width="552" height="280" rx="10" fill="#1e2130" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.45"/>
    <!-- Header with sparkle dot -->
    <circle cx="652" cy="290" r="5" fill="#a78bfa"/>
    <text x="668" y="295" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#a78bfa" letter-spacing="0.5">AI INSIGHTS · LOCAL · llama3.1:8b</text>
    <text x="1144" y="295" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="end">just now</text>

    <!-- Body lines (stylized prose) -->
    <g font-family="Inter, system-ui, sans-serif" font-size="13" fill="#e8eaed">
      <text x="640" y="334">May spending tracked $284 above April, driven mostly by</text>
      <text x="640" y="356">a Costco run on the 3rd ($186) and a one-time concert</text>
      <text x="640" y="378">ticket. Subscriptions held steady; the renewed NYT charge</text>
      <text x="640" y="400">for $25 hit on the 12th as expected.</text>
      <text x="640" y="430" fill="#9aa0a6">Net worth ticked up $4,182 over 30 days — taxable</text>
      <text x="640" y="452" fill="#9aa0a6">brokerage gained $2,890, mortgage principal paid down</text>
      <text x="640" y="474" fill="#9aa0a6">$1,180. Cash runway at 9.4 months remains comfortable.</text>
    </g>

    <!-- Ask pill (bottom-right hint) -->
    <g>
      <rect x="1020" y="498" width="128" height="28" rx="14" fill="#a78bfa"/>
      <circle cx="1038" cy="512" r="3" fill="#0f1117"/>
      <text x="1052" y="516" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#0f1117">Ask anything</text>
    </g>
  </g>

  <!-- Bottom caption -->
  <text x="600" y="582" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Local SQLite · Plaid bank sync · Local LLM · No cloud · Tusk Ledger</text>
</svg>
